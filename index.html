<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔱 G-GHOST | V30 SERIAL-STRIKER</title>
    <style>
        :root { 
            --bg: #030303; --card: #0d0d0d; --text: #ffffff; 
            --neon: #00f2ff; --bomb: #bc13fe; --gold: #FFD700; 
            --live: #00ff41; --dead: #ff3131; --warn: #ffae00; 
        }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding-bottom: 150px; 
            overflow-x: hidden; -webkit-tap-highlight-color: transparent; 
        }

        /* 🔱 Glow & Animations */
        @keyframes pulse-glow { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .guardian-active { animation: pulse-glow 2s infinite; color: var(--warn); }

        /* 🔱 Header & Status Bars */
        .app-bar { 
            background: rgba(0,0,0,0.9); padding: 15px; 
            display: flex; align-items: center; justify-content: space-between; 
            position: sticky; top: 0; z-index: 10000; 
            border-bottom: 1px solid #222; backdrop-filter: blur(15px); 
        }
        .logo { font-size: 20px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        
        #task-bar { 
            background: #111; padding: 8px 15px; border-bottom: 1px solid #222; 
            display: flex; font-size: 11px; color: #777; 
            justify-content: space-between; font-family: monospace; 
        }

        /* 🔱 Control Panel */
        .control-panel { 
            display: flex; gap: 10px; padding: 12px; 
            overflow-x: auto; background: #000; 
            border-bottom: 1px solid #222; position: sticky; 
            top: 55px; z-index: 9000; 
        }
        .p-btn { 
            background: #151515; color: #fff; border: 1px solid #333; 
            padding: 10px 18px; border-radius: 10px; font-size: 11px; 
            cursor: pointer; font-weight: bold; white-space: nowrap; 
            transition: 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .p-btn:active { transform: scale(0.95); background: #222; }
        .btn-strike { background: var(--neon); color: #000; border: none; font-weight: 900; }
        .btn-bomb { border-color: var(--bomb); color: var(--bomb); }
        .btn-danger { border-color: var(--dead); color: var(--dead); }

        /* 🔱 Video Grid */
        #video-feed { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); 
            gap: 15px; padding: 15px; 
        }
        .video-card { 
            position: relative; background: var(--card); 
            border-radius: 14px; border: 2px solid #1a1a1a; 
            overflow: hidden; transition: 0.3s; 
        }
        .video-card.selected { border-color: var(--neon); background: #111; box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        .video-card.is-looted { opacity: 0.4; filter: grayscale(0.8); }

        .thumb-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; cursor: pointer; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; }
        
        .video-meta { padding: 8px; font-size: 10px; color: #999; height: 32px; overflow: hidden; line-height: 1.2; }
        
        .badge-looted { 
            position: absolute; top: 6px; left: 6px; 
            background: var(--live); color: #000; font-size: 8px; 
            padding: 2px 6px; border-radius: 4px; font-weight: 900; z-index: 5; 
        }

        /* 🔱 Progress Overlay */
        #progress-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            z-index: 50000; display: none; flex-direction: column; 
            align-items: center; justify-content: center; backdrop-filter: blur(20px); 
        }
        .pg-bar { width: 85%; background:#1a1a1a; height:8px; border-radius:10px; margin: 25px 0; overflow: hidden; }
        .pg-fill { width: 0%; height: 100%; background: var(--neon); transition: 0.4s; box-shadow: 0 0 15px var(--neon); }
        
        #pg-percent { font-size: 70px; font-weight: 900; color: var(--neon); }
        #pg-status { font-size: 12px; color: var(--gold); font-family: monospace; text-align: center; max-width: 80%; }

        .search-box { padding: 10px 15px; background: #000; }
        #search-input { 
            width: 100%; background: #111; border: 1px solid #222; 
            color: #fff; padding: 12px; border-radius: 12px; font-size: 14px;
            outline: none; box-sizing: border-box;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="app-bar">
    <div class="logo">🔱 G-GHOST <span style="font-size:10px; color:var(--gold)">V30 SERIAL</span></div>
    <div style="display:flex; gap:10px;">
        <button onclick="startSequentialStrike()" class="p-btn btn-strike">🚀 STRIKE (<span id="q-count">0</span>)</button>
    </div>
</div>

<div id="task-bar">
    <span>🛰️ VAULT: <span id="vault-name" style="color:var(--neon)">BOMB-AA638</span></span>
    <span id="asset-count" style="color:var(--gold)">0 ASSETS</span>
</div>

<div class="search-box">
    <input type="text" id="search-input" placeholder="Search prompts..." oninput="renderView()">
</div>

<div class="control-panel">
    <button class="p-btn" onclick="refreshData()">🔄 SYNC VAULT</button>
    <button class="p-btn" onclick="selectAll()">✅ SELECT ALL</button>
    <button class="p-btn" onclick="clearQueue()">❌ CLEAR</button>
    <button class="p-btn btn-danger" onclick="purgeDeadLinks()">💀 PURGE DEAD</button>
</div>

<div id="video-feed"></div>

<div id="progress-overlay">
    <div id="pg-percent">0%</div>
    <div class="pg-bar"><div id="pg-fill" class="pg-fill"></div></div>
    <p id="pg-status">INITIATING SERIAL DOWNLOAD SEQUENCE...</p>
    <button class="p-btn btn-danger" style="margin-top:30px; padding:15px 40px;" onclick="abortStrike()">🛑 ABORT MISSION</button>
</div>

<script>
    // 🔱 CONFIGURATION
    const VAULT_URL = "https://bomb-aa638-default-rtdb.firebaseio.com/sora_vault";
    let masterData = [];
    let queue = [];
    let lootedHistory = JSON.parse(localStorage.getItem('ghost_looted_v30')) || [];
    let isAutoStriking = false;
    let wakeLock = null;

    // 🔱 DATA ENGINE
    async function refreshData() {
        const statusText = document.getElementById('asset-count');
        statusText.innerText = "🛰️ SCANNING...";
        try {
            const res = await fetch(`${VAULT_URL}.json?nocache=${Date.now()}`);
            const data = await res.json();
            let tempStore = [];

            function traverse(obj, path = "") {
                for (let key in obj) {
                    let item = obj[key];
                    let curPath = path ? `${path}/${key}` : key;
                    if (item && typeof item === 'object') {
                        const vUrl = item.clean || item.original_url || item.url;
                        if (vUrl) {
                            tempStore.push({
                                id: key,
                                dbPath: curPath,
                                clean: vUrl,
                                thumb: item.thumb || item.thumbnailUrl || 'https://via.placeholder.com/300x169/0d0d0d/333?text=G-GHOST',
                                prompt: item.prompt || 'Untitled_Asset',
                                time: item.timestamp || 0
                            });
                        } else traverse(item, curPath);
                    }
                }
            }
            if(data) traverse(data);
            masterData = tempStore.sort((a,b) => b.time - a.time);
            statusText.innerText = `${masterData.length} ASSETS SECURED`;
            renderView();
        } catch (e) {
            statusText.innerText = "❌ SYNC ERROR";
        }
    }

    function renderView() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const feed = document.getElementById('video-feed');
        feed.innerHTML = "";
        
        const filtered = query ? masterData.filter(i => i.prompt.toLowerCase().includes(query)) : masterData;

        filtered.forEach(item => {
            const isSelected = queue.some(q => q.id === item.id);
            const isLooted = lootedHistory.includes(item.id);
            
            const card = document.createElement('div');
            card.className = `video-card ${isSelected ? 'selected' : ''} ${isLooted ? 'is-looted' : ''}`;
            card.onclick = () => toggleSelect(item.id);
            card.innerHTML = `
                ${isLooted ? '<div class="badge-looted">LOOTED</div>' : ''}
                <div class="thumb-container">
                    <img class="thumb-img" src="${item.thumb}" loading="lazy">
                </div>
                <div class="video-meta">${item.prompt}</div>
            `;
            feed.appendChild(card);
        });
    }

    // 🔱 SELECTION ENGINE
    function toggleSelect(id) {
        const item = masterData.find(m => m.id === id);
        const idx = queue.findIndex(q => q.id === id);
        if(idx > -1) queue.splice(idx, 1); else queue.push(item);
        document.getElementById('q-count').innerText = queue.length;
        renderView();
    }

    function selectAll() {
        queue = [...masterData];
        document.getElementById('q-count').innerText = queue.length;
        renderView();
    }

    function clearQueue() {
        queue = [];
        document.getElementById('q-count').innerText = "0";
        renderView();
    }

    // 🔱 THE SERIAL STRIKER (MEM-SAFE DOWNLOADER)
    async function startSequentialStrike() {
        if (queue.length === 0) return alert("🔱 पहले टार्गेट चुनें (Select All दबाएँ)!");
        if (isAutoStriking) return;
        
        isAutoStriking = true;
        const overlay = document.getElementById('progress-overlay');
        const status = document.getElementById('pg-status');
        const fill = document.getElementById('pg-fill');
        const percent = document.getElementById('pg-percent');
        
        overlay.style.display = 'flex';
        await requestWakeLock();

        for (let i = 0; i < queue.length; i++) {
            if (!isAutoStriking) break;

            const item = queue[i];
            status.innerHTML = `🔱 STRIKING ASSET ${i+1}/${queue.length}<br><span style="color:#fff; font-size:10px;">${item.prompt.substring(0,40)}...</span>`;

            try {
                // 1. Fetch File
                const response = await fetch(item.clean);
                if (!response.ok) throw "Dead Link";
                const blob = await response.blob();
                
                // 2. Direct Browser Save
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                // Clean filename
                const safeName = item.prompt.substring(0,30).replace(/[^a-z0-9]/gi,'_');
                a.download = `GHOST_${safeName}_${item.id.substring(0,4)}.mp4`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                // 3. Update Local History
                if (!lootedHistory.includes(item.id)) {
                    lootedHistory.push(item.id);
                    localStorage.setItem('ghost_looted_v30', JSON.stringify(lootedHistory));
                }

            } catch (e) {
                console.error("Strike Failed:", item.id);
                status.innerHTML += `<br><span style="color:var(--dead)">⚠️ SKIPPED: LINK EXPIRED</span>`;
                await new Promise(r => setTimeout(r, 1000));
            }

            // Progress Update
            let p = Math.round(((i + 1) / queue.length) * 100);
            fill.style.width = p + '%';
            percent.innerText = p + '%';

            // 4. Cool-down (Prevent browser throttling)
            await new Promise(r => setTimeout(r, 2000));
        }

        isAutoStriking = false;
        overlay.style.display = 'none';
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        alert("🔱 MISSION ACCOMPLISHED: VAULT DATA SECURED!");
        renderView();
    }

    function abortStrike() {
        isAutoStriking = false;
        location.reload();
    }

    // 🔱 THE PURGE ENGINE (Silent cleaning)
    async function purgeDeadLinks() {
        if(!confirm("🔱 Start deep scan and purge dead links from Firebase?")) return;
        
        const overlay = document.getElementById('progress-overlay');
        const status = document.getElementById('pg-status');
        overlay.style.display = 'flex';
        
        let deadCount = 0;
        for (let i = 0; i < masterData.length; i++) {
            const item = masterData[i];
            status.innerText = `🔍 SCANNING: ${i+1}/${masterData.length} | DEAD: ${deadCount}`;
            
            try {
                const res = await fetch(item.clean, { method: 'HEAD' });
                if(!res.ok) throw "Dead";
            } catch (e) {
                deadCount++;
                await fetch(`${VAULT_URL}/${item.dbPath}.json`, { method: 'DELETE' });
            }
        }
        
        overlay.style.display = 'none';
        alert(`🔱 PURGE COMPLETE: ${deadCount} dead links removed.`);
        refreshData();
    }

    // 🔱 WAKE LOCK (Keep screen alive)
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) { console.log("WakeLock failed"); }
    }

    // Initial Sync
    refreshData();
</script>
</body>
</html>
